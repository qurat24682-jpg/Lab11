name: Run Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2

    - name: Setup Python
      uses: actions/setup-python@v2
      with:
        python-version: 3.x

    - name: Run Task 1 & 2
      run: python task_1_2.py

    - name: Run Task 3 & 4
      run: python task_3_4_5.py
